version: '3.8'

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: ${LAKEFS_DB_USER}
      POSTGRES_PASSWORD: ${LAKEFS_DB_PASSWORD}
      POSTGRES_DB: ${LAKEFS_DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lakefs-network

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - lakefs-network

  lakefs:
    image: treeverse/lakefs:latest
    ports:
      - "8000:8000"
    environment:
      LAKEFS_DATABASE_TYPE: postgres
      LAKEFS_DATABASE_POSTGRES_CONNECTION_STRING: postgres://${LAKEFS_DB_USER}:${LAKEFS_DB_PASSWORD}@postgres:5432/${LAKEFS_DB_NAME}?sslmode=disable
      LAKEFS_AUTH_ENCRYPT_SECRET_KEY: ${LAKEFS_SECRET_KEY}
      LAKEFS_BLOCKSTORE_TYPE: s3
      LAKEFS_BLOCKSTORE_S3_CREDENTIALS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      LAKEFS_BLOCKSTORE_S3_CREDENTIALS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      LAKEFS_BLOCKSTORE_S3_ENDPOINT: http://minio:9000
      LAKEFS_BLOCKSTORE_S3_FORCE_PATH_STYLE: true
    depends_on:
      - postgres
      - minio
    networks:
      - lakefs-network

volumes:
  postgres_data:
  minio_data:

networks:
  lakefs-network:
