replicaCount: 2

image:
  repository: ml-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  host: ml.example.com
  path: /

resources:
  requests:
    memory: 256Mi
    cpu: 250m
  limits:
    memory: 512Mi
    cpu: 500m

database:
  url: postgresql://user:pass@postgres-service:5432/ml_logs
