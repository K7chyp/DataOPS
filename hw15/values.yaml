# Количество реплик
replicaCount: 1

# Настройки образа
image:
  repository: nginx
  tag: "1.25"          
  pullPolicy: IfNotPresent

# Ресурсы (requests/limits)
resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 128Mi

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false      
  className: ""
  annotations: {}
    kubernetes.io/ingress.class: nginx
    kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
   - secretName: chart-example-tls
     hosts:
       - chart-example.local